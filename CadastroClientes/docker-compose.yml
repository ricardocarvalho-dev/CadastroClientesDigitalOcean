version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cadastro-api
    command: ["api/CadastroClientes.Api.dll"]
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - RabbitMQ__Uri=${RABBITMQ_URI}
      - RabbitMQ__QueueName=fila-cadastro-clientes
      - Resend__ApiKey=${RESEND_API_KEY}
      - Resend__FromEmail=${RESEND_FROM_EMAIL:-noreply@evoluasoftware.com.br}
      - Resend__FromName=${RESEND_FROM_NAME:-Ricardodev Solucao WEB}
      - Twilio__AccountSid=${TWILIO_ACCOUNT_SID}
      - Twilio__AuthToken=${TWILIO_AUTH_TOKEN}
      - Twilio__MessagingServiceSid=${TWILIO_MESSAGING_SERVICE_SID}
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cadastro-web
    command: ["web/CadastroClientes.Web.dll", "--urls", "http://+:8081"]
    ports:
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8081
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - ApiBaseUrl=http://api:8080
      - Resend__ApiKey=${RESEND_API_KEY}
      - Twilio__AccountSid=${TWILIO_ACCOUNT_SID}
      - Twilio__AuthToken=${TWILIO_AUTH_TOKEN}
      - Twilio__MessagingServiceSid=${TWILIO_MESSAGING_SERVICE_SID}
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
